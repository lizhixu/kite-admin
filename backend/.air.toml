root = "."
tmp_dir = "tmp"

[build]
  # Windows requires .exe extension for binary
  cmd = "go build -o ./tmp/main.exe ./main.go"
  bin = "tmp\\main.exe"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "frontend"]
  exclude_file = []
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
